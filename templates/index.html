<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>欠点モニタリングダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script>window.POSITION_MAX = {{ position_max }};</script>
</head>
<body>

<div class="ribbon"></div>

<header class="topbar">
  <div class="topbar__title">
    <span class="topbar__eyebrow">FLOAT LINE / DEFECT MONITOR</span>
    <h1>欠点モニタリングダッシュボード</h1>
  </div>
  <div class="topbar__status">
    <label class="live-toggle">
      <input type="checkbox" id="liveToggle">
      <span class="live-dot"></span>
      リアルタイム更新
    </label>
    <span id="lastUpdated" class="topbar__updated">—</span>
  </div>
</header>

<div class="layout">

  <!-- 左: フィルターパネル -->
  <aside class="panel filter-panel">
    <h2 class="panel__title">フィルター</h2>

    <div class="field">
      <label for="startInput">開始日時</label>
      <input type="datetime-local" id="startInput">
    </div>
    <div class="field">
      <label for="endInput">終了日時</label>
      <input type="datetime-local" id="endInput">
    </div>

    <div class="field">
      <label>欠点種類</label>
      <div id="defectTypeList" class="checkbox-list">
        <span class="muted">読み込み中…</span>
      </div>
    </div>

    <button id="applyFilter" class="btn-primary">適用</button>

    <div class="quick-range">
      <span class="quick-range__label">クイック選択</span>
      <button class="btn-quick" data-hours="1">1時間</button>
      <button class="btn-quick" data-hours="8">8時間</button>
      <button class="btn-quick" data-hours="24">24時間</button>
      <button class="btn-quick" data-hours="168">7日間</button>
    </div>

    <div id="errorBox" class="error-box" hidden></div>
  </aside>

  <!-- 中央: 欠点マップ + トレンド -->
  <main class="panel center-panel">
    <div class="chart-block chart-block--map">
      <h2 class="panel__title">欠点マップ<span class="panel__sub">位置 × 時刻(上:左 / 下:右)</span></h2>
      <div id="defectMap" class="chart"></div>
    </div>
    <div class="chart-block chart-block--trend">
      <h2 class="panel__title">時間帯別トレンド<span class="panel__sub">1時間ごとの発生分数</span></h2>
      <div id="trendChart" class="chart"></div>
    </div>
  </main>

  <!-- 右: 写真リスト -->
  <aside class="panel photo-panel">
    <h2 class="panel__title">現場写真<span class="panel__sub">Box連携</span></h2>
    <div id="photoList" class="photo-list">
      <span class="muted">フィルターを適用すると表示されます</span>
    </div>
  </aside>

</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
