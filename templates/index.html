<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スナップモニタリングダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script>window.POSITION_MAX = {{ position_max }};</script>
</head>
<body>

<div class="ribbon"></div>

<header class="topbar">
  <div class="topbar__title">
    <h1>スナップモニタリングダッシュボード</h1>
  </div>
  <div class="topbar__status">
    <label class="live-toggle">
      <input type="checkbox" id="liveToggle" checked>
      <span class="live-dot"></span>
      リアルタイム更新
    </label>
    <span id="lastUpdated" class="topbar__updated">—</span>
  </div>
</header>

<div class="layout">

  <!-- 左: フィルターパネル -->
  <aside class="panel filter-panel">
    <h2 class="panel__title">フィルター</h2>

    <div class="field">
      <label for="startInput">開始日時</label>
      <input type="datetime-local" id="startInput">
    </div>
    <div class="field">
      <label for="endInput">終了日時</label>
      <input type="datetime-local" id="endInput">
    </div>

    <div class="field">
      <label>表示範囲(絞り込み)</label>
      <div class="range-slider" id="periodSlider">
        <div class="range-slider__track"></div>
        <div class="range-slider__fill" id="periodSliderFill"></div>
        <input type="range" id="periodSliderMin" min="0" max="1000" value="0">
        <input type="range" id="periodSliderMax" min="0" max="1000" value="1000">
      </div>
      <div class="range-slider__values" id="periodSliderValues">—</div>
    </div>

    <div class="field">
      <div class="field__header">
        <label>スナップ・欠点種類</label>
        <div class="type-select-buttons">
          <button type="button" id="selectAllTypes" class="btn-link">全選択</button>
          <button type="button" id="deselectAllTypes" class="btn-link">全解除</button>
        </div>
      </div>
      <div id="defectTypeList" class="checkbox-list">
        <span class="muted">読み込み中…</span>
      </div>
    </div>

    <div class="field">
      <label>グラフ表示要素</label>
      <div id="overlaySeriesList" class="checkbox-list">
        <span class="muted">読み込み中…</span>
      </div>
    </div>

    <button id="applyFilter" class="btn-primary">適用</button>

    <div id="errorBox" class="error-box" hidden></div>

    <div class="box-link-section">
      <a href="https://agc.ent.box.com/folder/354740164678" target="_blank" rel="noopener noreferrer" class="box-link">
        ストリエboxリンク
      </a>
    </div>
  </aside>

  <!-- 中央: スナップマップ + トレンド -->
  <main class="panel center-panel">
    <div class="chart-block chart-block--map">
      <div id="defectMap" class="chart"></div>
      <div id="mapLegend" class="map-legend"></div>
    </div>
    <div class="chart-block chart-block--trend">
      <div class="chart-block__header">
        <h2 class="panel__title">時間帯別トレンド<span class="trend-legend" id="trendLegend"></span></h2>
        <div class="trend-tabs">
          <button type="button" id="trendTabDefects" class="btn-tab active">発生分数</button>
          <button type="button" id="trendTabLobb" class="btn-tab">LOBB発生個数</button>
        </div>
      </div>
      <div id="trendChart" class="chart"></div>
    </div>
  </main>

</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
